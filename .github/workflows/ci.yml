name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dev dependencies
        run: npm install --no-audit --no-fund
      - name: Syntax check distributables
        run: |
          node --check dist/searchable-dropdown.js
          node --check dist/searchable-dropdown-auto.js
          node --check dist/searchable-dropdown.mjs
          node --check server/searchable-dropdown-mongo.js
      - name: Run tests
        run: npm test
