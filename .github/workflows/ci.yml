name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dev dependencies
        run: npm install --no-audit --no-fund
      - name: Verify committed dist/ matches a fresh build from src/
        run: |
          npm run build
          git diff --exit-code -- dist/liveselect.js dist/liveselect.mjs \
            || { echo "::error::dist/ is stale — run 'npm run build' and commit the result"; exit 1; }
      - name: Syntax check distributables
        run: |
          node --check dist/liveselect.js
          node --check dist/liveselect-auto.js
          node --check dist/liveselect.mjs
          node --check server/liveselect-mongo.js
      - name: Run tests
        run: npm test
