name: Publish to npm

# Publishes the package to npm whenever a version tag (v*) is pushed.
# Requires a repository secret NPM_TOKEN — an npm automation/granular token with
# read+write on the package and "bypass 2FA" enabled (so CI can publish without
# an interactive one-time code).

on:
  push:
    tags:
      - 'v*'
  # Manual trigger — lets you publish the current package.json version without
  # pushing a new tag (e.g. to release the already-tagged 1.0.0).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dev dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
