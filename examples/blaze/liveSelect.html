<!--
  liveSelect.html — Blaze wrapper around the framework-agnostic control.

  WHAT: A thin Blaze template that renders an empty mount point and lets the
        vanilla LiveSelect class take over in onRendered. This way a
        Meteor/Blaze app uses the EXACT same JS + CSS as every other framework —
        no Blaze-specific reimplementation.

  USAGE in a parent template:
    {{> liveSelect
          name="customerId"
          label="Customer"
          collectionKey="customers"
          allowCreate=true
          onSelect=onCustomerSelect }}

  Load dist/liveselect.css once in your app's <head>, and import the
  class in liveSelect.js (see that file).
-->
<template name="liveSelect">
  <div class="sdd-blaze-mount"></div>
</template>
